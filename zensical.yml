# Zensical Configuration
# https://zensical.org/docs/reference/configuration/

site_name: Flynns 2nd Brain
site_description: Personal knowledge base and documentation.
site_author: nflynn
site_url: https://www.eper.net

theme:
  name: material
  custom_dir: theme
  logo: assets/images/chi-dna.svg
  favicon: assets/images/bluebook.svg
  features:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

# Built-in plugins (enabled by default in Zensical)
plugins:
  - search
  - rss
  - git-revision-date:
      type: timeago

# Custom CSS/JS
extra_css:
  - stylesheets/extra.css
  - stylesheets/links.css

# Repository information
repo_name: eperdeme/digital-garden
repo_url: https://github.com/eperdeme/digital-garden

# Markdown extensions (Zensical supports common MkDocs extensions)
markdown_extensions:
  - abbr
  - admonition
  - meta
  - def_list
  - toc:
      permalink: ⚑
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Mermaid theme configuration
extra:
  analytics:
    provider: google
    property: G-6BLZKM0HS6
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/eperdeme
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/eperdeme
    - icon: fontawesome/solid/paper-plane
      link: mailto:nflynn@eper.net
  copyright: |
    Copyright &copy; 2026 nflynn
  mermaid:
    theme: base
    themeVariables:
      primaryColor: "#5c6bc0"
      primaryTextColor: "#fff"
      primaryBorderColor: "#3f51b5"
      lineColor: "#8e9acc"
      secondaryColor: "#00897b"
      tertiaryColor: "#5c6bc0"
