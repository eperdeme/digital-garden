---
name: github pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: 11 06 * * *

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.10'

      - name: Sync dependencies
        run: make sync

      - name: Update dependencies (scheduled)
        if: github.event_name == 'schedule'
        run: make update

      - name: Make the site
        run: make build-docs

      - name: Commit files
        if: github.event_name == 'schedule'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add uv.lock
          git diff-index --quiet HEAD \
            || git commit -m "chore: update dependencies (scheduled)"
      - name: Push changes
        if: github.event_name == 'schedule'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
